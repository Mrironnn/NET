<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NET</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --accent: #0078d4;
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100dvh;
            overflow: hidden;
            flex-direction: column;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .auth-box {
            background: var(--panel);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            width: 320px;
            text-align: center;
        }

        #main-app {
            display: none;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 300px;
            background: var(--panel);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .chat-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #080808;
            visibility: hidden;
            height: 100dvh;
        }

        /* Обновленный Header с аватаркой */
        .header {
            padding: 20px;
            border-bottom: 1px solid #222;
            font-weight: bold;
            font-size: 1.1em;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .my-profile-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: 0.2s;
        }

            .my-profile-btn:hover {
                background: #222;
            }

        .net-logo {
            font-size: 1.5em;
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
        }

            .net-logo span {
                color: var(--accent);
            }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            list-style: none;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        .msg-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 8px;
            max-width: 75%;
        }

            .msg-container.my-msg-container {
                align-self: flex-end;
                flex-direction: row-reverse;
            }

        .msg {
            background: #1a1a1a;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #222;
            word-wrap: break-word;
        }

        .my-msg {
            border-right: 3px solid var(--accent);
            background: #1e1e1e;
        }

        .input-box {
            padding: 20px;
            background: var(--panel);
            display: flex;
            gap: 10px;
            border-top: 1px solid #222;
            align-items: center;
            flex-shrink: 0;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        input[type="text"], input[type="email"], input[type="password"], textarea {
            background: #222;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            flex-grow: 1;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

            button:hover {
                background: #005a9e;
            }

        .user-item {
            padding: 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .user-item:hover {
                background: #1e1e1e;
            }

        /* --- СТИЛИ АВАТАРОК --- */
        .avatar-img, .avatar-circle {
            border-radius: 50%;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            background: #333;
            cursor: pointer;
        }

        .sz-sm {
            width: 35px;
            height: 35px;
            font-size: 0.9em;
        }

        .sz-md {
            width: 50px;
            height: 50px;
            font-size: 1.2em;
        }

        .sz-lg {
            width: 120px;
            height: 120px;
            font-size: 2.5em;
            border: 3px solid #222;
        }

        /* Загрузка аватарки при регистрации */
        .reg-avatar-upload {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #222;
            margin: 0 auto 20px auto;
            border: 2px dashed #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

            .reg-avatar-upload:hover {
                border-color: var(--accent);
            }

        .reg-avatar-text {
            font-size: 0.8em;
            color: #888;
        }

        .reg-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            display: none;
        }

        .code-section {
            padding: 15px;
            border-bottom: 1px solid #222;
            background: #0f0f0f;
        }

        .code-display {
            font-size: 1.2em;
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* --- СТИЛИ ПРОФИЛЯ (МОДАЛЬНОЕ ОКНО С БЛЮРОМ) --- */
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px); /* Тот самый блюр */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }

            .profile-modal.show {
                display: flex;
                opacity: 1;
            }

        .profile-card {
            background: var(--panel);
            width: 320px;
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        .profile-name {
            margin: 15px 0 5px 0;
            font-size: 1.5em;
        }

        .profile-desc {
            color: #aaa;
            font-size: 0.95em;
            min-height: 40px;
            word-wrap: break-word;
        }

        .profile-desc-edit {
            display: none;
            width: 100%;
            resize: none;
            height: 80px;
            margin-top: 10px;
        }

        .edit-controls {
            margin-top: 15px;
            display: none;
            gap: 10px;
            justify-content: center;
        }

        .edit-avatar-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--accent);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            cursor: pointer;
            border: 2px solid var(--panel);
        }

        /* Уведомления. Z-index 1000 - поверх блюра */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            background: var(--panel);
            border-left: 4px solid var(--accent);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            min-width: 200px;
            max-width: 300px;
            word-wrap: break-word;
        }

            .toast.show {
                opacity: 1;
                transform: translateY(0);
            }

        .back-btn {
            display: none;
            cursor: pointer;
            margin-right: 15px;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            #main-app {
                position: relative;
            }

            .sidebar {
                width: 100%;
                border-right: none;
            }

            .chat-area {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
                background: var(--bg);
            }

            .back-btn {
                display: inline-block;
            }

            #toast-container {
                bottom: auto;
                top: 10px;
                right: 10px;
                left: 10px;
            }

            .toast {
                max-width: unset;
                width: calc(100% - 40px);
            }

            .auth-box {
                width: 85%;
            }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div id="auth-modal" class="modal">
        <div class="auth-box">
            <div class="net-logo">N<span>E</span>T</div>
            <h2 id="auth-title">Вход</h2>
            <input type="email" id="email" placeholder="Email"><br><br>
            <input type="password" id="pass" placeholder="Пароль"><br><br>
            <button onclick="handleAuth()" id="auth-btn" style="width:100%">Войти</button>
            <p style="font-size: 0.8em; margin-top: 15px; cursor: pointer; color: #888;" onclick="toggleAuth()">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <div id="name-modal" class="modal" style="display: none;">
        <div class="auth-box">
            <h2>Создание профиля</h2>
            <div class="reg-avatar-upload" onclick="document.getElementById('reg-avatar-input').click()">
                <span class="reg-avatar-text">+ Фото</span>
                <img id="reg-avatar-preview" class="reg-avatar-img">
            </div>
            <input type="file" id="reg-avatar-input" style="display:none" onchange="previewRegAvatar()" accept="image/*">
            <input type="text" id="new-name" placeholder="Твой ник"><br><br>
            <button onclick="saveInitProfile()" style="width:100%">Начать</button>
        </div>
    </div>

    <div id="profile-modal" class="profile-modal" onclick="closeProfile(event)">
        <div class="profile-card" onclick="event.stopPropagation()">
            <div style="position: relative; display: inline-block;">
                <div id="profile-avatar-container"></div>
                <div id="edit-avatar-btn" class="edit-avatar-badge" onclick="document.getElementById('prof-avatar-input').click()">📷</div>
                <input type="file" id="prof-avatar-input" style="display:none" onchange="updateProfileAvatar()" accept="image/*">
            </div>

            <h2 id="profile-name" class="profile-name">Имя</h2>
            <div id="profile-desc-display" class="profile-desc"></div>
            <textarea id="profile-desc-input" class="profile-desc-edit" placeholder="Напишите немного о себе..."></textarea>

            <div id="profile-edit-controls" class="edit-controls">
                <button onclick="toggleEditMode()" style="background:#333;">Отмена</button>
                <button onclick="saveProfileChanges()">Сохранить</button>
            </div>
            <button id="profile-start-edit-btn" onclick="toggleEditMode()" style="margin-top:15px; width:100%; display:none;">Редактировать описание</button>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <div class="header">
                <span class="net-logo" style="margin:0; font-size:1.2em;">N<span>E</span>T</span>
                <div class="my-profile-btn" onclick="openProfile(myId)">
                    <span id="my-name-display" style="font-size: 0.9em; font-weight: normal;">...</span>
                    <div id="my-avatar-display"></div>
                </div>
            </div>
            <div class="code-section">
                Ваш код: <span class="code-display" id="my-code-display">...</span>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="friend-code" placeholder="Код друга" maxlength="6" style="margin-bottom:0">
                    <button onclick="addFriend()">+</button>
                </div>
            </div>
            <div id="user-list"></div>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="header" id="chat-with">Чат</div>
            <div id="messages"></div>
            <div class="input-box">
                <input type="file" id="file-input" style="display:none" onchange="uploadPhotoMsg()" accept="image/*">
                <button onclick="document.getElementById('file-input').click()" style="background: #333; padding: 10px 15px;">📎</button>
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button onclick="send()" style="padding: 10px 20px;">Отправить</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId, myName, myCode, currentChatId = null;
        let myAvatar = '';
        let myDescription = '';
        let tempRegAvatarUrl = ''; // Для хранения фото при регистрации
        let contactsMap = {}; // Храним данные друзей для быстрого доступа к аватаркам в чате

        let currentProfileEditId = null; // ID профиля, открытого в данный момент
        let isEditingProfile = false;

        // --- ГЕНЕРАТОР АВАТАРОК ---
        // Если есть ссылка - картинка, если нет - кружок с буквой
        function getAvatarHtml(name, avatarUrl, sizeClass, onclickStr = '') {
            const letter = (name || 'U').charAt(0).toUpperCase();
            if (avatarUrl && avatarUrl.trim() !== '') {
                return `<img src="${avatarUrl}" class="avatar-img ${sizeClass}" ${onclickStr ? `onclick="${onclickStr}"` : ''}>`;
            }
            return `<div class="avatar-circle ${sizeClass}" ${onclickStr ? `onclick="${onclickStr}"` : ''}>${letter}</div>`;
        }

        window.onload = async () => {
            const savedSession = localStorage.getItem('net_session');
            if (savedSession) {
                const data = JSON.parse(savedSession);
                const res = await fetch(`/validate-session?id=${data.id}`);
                const status = await res.json();

                if (status.valid) {
                    myId = status.user.id;
                    myName = status.user.name;
                    myCode = status.user.code;
                    myAvatar = status.user.avatar || '';
                    myDescription = status.user.description || '';
                    document.getElementById('auth-modal').style.display = 'none';
                    startApp();
                } else {
                    localStorage.removeItem('net_session');
                }
            }
        };

        function toggleAuth() {
            const t = document.getElementById('auth-title');
            const b = document.getElementById('auth-btn');
            const isLogin = t.innerText === "Вход";
            t.innerText = isLogin ? "Регистрация" : "Вход";
            b.innerText = isLogin ? "Создать аккаунт" : "Войти";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const isReg = document.getElementById('auth-title').innerText === "Регистрация";
            const res = await fetch(isReg ? '/register' : '/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok) {
                myId = data.id; myCode = data.code;
                document.getElementById('auth-modal').style.display = 'none';
                if (isReg) {
                    document.getElementById('name-modal').style.display = 'flex';
                } else {
                    myName = data.name; myAvatar = data.avatar || ''; myDescription = data.description || '';
                    saveLocalSession();
                    startApp();
                }
            } else alert(data.error);
        }

        // --- РЕГИСТРАЦИЯ: Загрузка фото до сохранения имени ---
        async function previewRegAvatar() {
            const fileInput = document.getElementById('reg-avatar-input');
            if (!fileInput.files[0]) return;
            const formData = new FormData();
            formData.append('photo', fileInput.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.url) {
                tempRegAvatarUrl = data.url;
                const img = document.getElementById('reg-avatar-preview');
                img.src = data.url;
                img.style.display = 'block';
                document.querySelector('.reg-avatar-text').style.display = 'none';
            }
        }

        async function saveInitProfile() {
            myName = document.getElementById('new-name').value || "User";
            myAvatar = tempRegAvatarUrl;
            await fetch('/update-profile-init', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: myId, name: myName, avatar: myAvatar })
            });
            saveLocalSession();
            document.getElementById('name-modal').style.display = 'none';
            startApp();
        }

        function saveLocalSession() {
            localStorage.setItem('net_session', JSON.stringify({ id: myId, name: myName, code: myCode }));
        }

        function startApp() {
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('my-code-display').innerText = myCode;
            document.getElementById('my-name-display').innerText = myName;

            // Отрисовка своей аватарки в шапке
            document.getElementById('my-avatar-display').innerHTML = getAvatarHtml(myName, myAvatar, 'sz-sm');

            socket.emit('join', myId);
            loadContacts();
            if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                Notification.requestPermission();
            }
        }

        // --- ЛОГИКА ПРОФИЛЕЙ ---
        async function openProfile(userId) {
            // Если кликнули на аватарку, не даем событию провалиться ниже
            if (event) event.stopPropagation();

            const res = await fetch(`/profile/${userId}`);
            const user = await res.json();

            if (user.error) return alert("Ошибка загрузки профиля");

            currentProfileEditId = userId;
            const isMe = userId === myId;

            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-avatar-container').innerHTML = getAvatarHtml(user.name, user.avatar, 'sz-lg');

            // Описание
            const desc = user.description || (isMe ? "У вас пока нет описания. Расскажите о себе!" : "Пользователь пока ничего не рассказал о себе.");
            document.getElementById('profile-desc-display').innerText = desc;
            document.getElementById('profile-desc-input').value = user.description || '';

            // Права доступа (защита)
            document.getElementById('edit-avatar-btn').style.display = isMe ? 'flex' : 'none';
            document.getElementById('profile-start-edit-btn').style.display = isMe ? 'block' : 'none';

            // Сброс состояния редактирования
            isEditingProfile = false;
            document.getElementById('profile-desc-display').style.display = 'block';
            document.getElementById('profile-desc-input').style.display = 'none';
            document.getElementById('profile-edit-controls').style.display = 'none';

            // Показываем окно
            document.getElementById('profile-modal').classList.add('show');
        }

        function closeProfile(e) {
            // Закрываем только если кликнули по темному фону (не по самой карточке)
            if (e && e.target.id !== 'profile-modal') return;
            document.getElementById('profile-modal').classList.remove('show');
        }

        function toggleEditMode() {
            isEditingProfile = !isEditingProfile;
            document.getElementById('profile-desc-display').style.display = isEditingProfile ? 'none' : 'block';
            document.getElementById('profile-desc-input').style.display = isEditingProfile ? 'block' : 'none';
            document.getElementById('profile-edit-controls').style.display = isEditingProfile ? 'flex' : 'none';
            document.getElementById('profile-start-edit-btn').style.display = isEditingProfile ? 'none' : 'block';
        }

        async function saveProfileChanges() {
            const newDesc = document.getElementById('profile-desc-input').value;
            await fetch('/edit-profile', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: myId, description: newDesc, avatar: myAvatar })
            });
            myDescription = newDesc;
            document.getElementById('profile-desc-display').innerText = newDesc || "У вас пока нет описания.";
            toggleEditMode();
        }

        async function updateProfileAvatar() {
            const fileInput = document.getElementById('prof-avatar-input');
            if (!fileInput.files[0]) return;
            const formData = new FormData();
            formData.append('photo', fileInput.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.url) {
                myAvatar = data.url;
                // Сразу сохраняем в базу
                await fetch('/edit-profile', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: myId, description: myDescription, avatar: myAvatar })
                });
                // Обновляем картинки
                document.getElementById('profile-avatar-container').innerHTML = getAvatarHtml(myName, myAvatar, 'sz-lg');
                document.getElementById('my-avatar-display').innerHTML = getAvatarHtml(myName, myAvatar, 'sz-sm');
            }
        }


        async function loadContacts() {
            try {
                const res = await fetch(`/contacts?userId=${myId}`);
                const contacts = await res.json();
                const ul = document.getElementById('user-list');
                ul.innerHTML = '';
                contactsMap = {}; // Очищаем старую мапу

                if (!Array.isArray(contacts)) return;

                contacts.forEach(c => {
                    contactsMap[c.id] = c; // Запоминаем данные друга для чата
                    const div = document.createElement('div');
                    div.className = 'user-item';

                    // Аватарка, при клике на которую открывается профиль
                    const avatarHtml = getAvatarHtml(c.name, c.avatar, 'sz-sm', `openProfile(${c.id})`);

                    div.innerHTML = `${avatarHtml} <span style="flex-grow:1;" onclick="selectChat(${c.id}, '${c.name}')">${c.name}</span>`;
                    ul.appendChild(div);
                });
            } catch (e) { console.error("Ошибка:", e); }
        }

        async function addFriend() {
            const code = document.getElementById('friend-code').value.toUpperCase();
            if (!code) return;
            try {
                const res = await fetch('/add-contact', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: myId, code })
                });
                if (res.ok) {
                    document.getElementById('friend-code').value = '';
                    loadContacts();
                } else {
                    const errObj = await res.json();
                    alert(errObj.error || "Ошибка");
                }
            } catch (e) { alert("Ошибка сети"); }
        }

        async function selectChat(id, name) {
            currentChatId = id;
            const backBtnHtml = window.innerWidth <= 768 ? '<span class="back-btn" onclick="closeMobileChat()">⬅️</span>' : '';

            // В шапке чата тоже показываем аватарку друга
            const friendData = contactsMap[id];
            const headerAvatar = getAvatarHtml(name, friendData?.avatar, 'sz-sm', `openProfile(${id})`);

            document.getElementById('chat-with').innerHTML = `${backBtnHtml} <div style="display:flex; align-items:center; gap:10px;">${headerAvatar} ${name}</div>`;
            document.getElementById('chat-area').style.visibility = 'visible';
            const ul = document.getElementById('messages');
            ul.innerHTML = '';

            try {
                const res = await fetch(`/messages?u1=${myId}&u2=${id}`);
                const history = await res.json();
                if (!Array.isArray(history)) return;
                history.forEach(msg => {
                    renderMessage({ userId: msg.sender_id, text: msg.text, type: msg.type });
                });
            } catch (e) { console.error(e); }
        }

        let toastQueue = [];
        let isToastProcessing = false;
        function showToast(title, text) {
            toastQueue.push({ title, text });
            if (!isToastProcessing) processToastQueue();
        }

        function processToastQueue() {
            if (toastQueue.length === 0) { isToastProcessing = false; return; }
            isToastProcessing = true;
            const data = toastQueue.shift();
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<strong>${data.title}</strong><br><span style="font-size: 0.9em; color: #ccc;">${data.text}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
            if (toastQueue.length > 0) setTimeout(processToastQueue, 1500);
            else setTimeout(() => { isToastProcessing = false; }, 1500);
        }

        function closeMobileChat() {
            document.getElementById('chat-area').style.visibility = 'hidden';
            currentChatId = null;
        }

        function send() {
            const input = document.getElementById('msg-input');
            if (input.value && currentChatId) {
                socket.emit('chat message', { userId: myId, toId: currentChatId, text: input.value, type: 'text' });
                input.value = '';
            }
        }

        async function uploadPhotoMsg() {
            const fileInput = document.getElementById('file-input');
            if (!fileInput.files[0]) return;
            const formData = new FormData();
            formData.append('photo', fileInput.files[0]);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.url) {
                socket.emit('chat message', { userId: myId, toId: currentChatId, text: data.url, type: 'image' });
            } else alert("Ошибка!");
            fileInput.value = '';
        }

        function renderMessage(data) {
            const isMe = data.userId === myId;
            let senderName = myName;
            let senderAvatarUrl = myAvatar;

            // Если сообщение от друга, достаем его данные из мапы контактов
            if (!isMe) {
                const friendInfo = contactsMap[data.userId];
                senderName = friendInfo ? friendInfo.name : 'Unknown';
                senderAvatarUrl = friendInfo ? friendInfo.avatar : '';
            }

            const div = document.createElement('div');
            div.className = `msg-container ${isMe ? 'my-msg-container' : ''}`;

            // Аватарка в чате
            const avatarHtml = getAvatarHtml(senderName, senderAvatarUrl, 'sz-sm', `openProfile(${data.userId})`);

            // Само сообщение
            let contentHtml = '';
            if (data.type === 'image') {
                contentHtml = `<img src="${data.text}" style="max-width:100%; border-radius:10px; display:block;">`;
            } else {
                contentHtml = data.text;
            }

            div.innerHTML = `
                    ${avatarHtml}
                    <div class="msg ${isMe ? 'my-msg' : ''}">
                        ${isMe ? '' : `<strong style="font-size:0.8em; color:var(--accent); display:block; margin-bottom:3px;">${senderName}</strong>`}
                        ${contentHtml}
                    </div>
                `;

            document.getElementById('messages').appendChild(div);
            const obj = document.getElementById('messages');
            obj.scrollTop = obj.scrollHeight;
        }

        document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });

        const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

        socket.on('chat message', (data) => {
            if (data.userId !== myId && data.toId !== myId) return;
            const isCurrentChat = (data.userId === myId && data.toId === currentChatId) || (data.userId === currentChatId && data.toId === myId);

            if (isCurrentChat) renderMessage(data);

            if (data.toId === myId && data.userId !== myId) {
                if (document.hidden || !isCurrentChat) {
                    const friendName = contactsMap[data.userId]?.name || 'User';
                    const msgSnippet = data.type === 'image' ? '🖼️ Фотография' : data.text;

                    if (document.hidden && typeof notifySound !== 'undefined') {
                        notifySound.play().catch(e => console.log("Sound error"));
                    }
                    if (!isCurrentChat) showToast(friendName, msgSnippet);

                    if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
                        const notif = new Notification(`Новое сообщение от ${friendName}`, { body: msgSnippet });
                        setTimeout(() => notif.close(), 5000);
                        notif.onclick = () => { window.focus(); notif.close(); };
                    }
                }
            }
        });

        socket.on('contact added', () => loadContacts());
    </script>
</body>
</html>
